openapi: 3.0.3
info:
  title: Payments API
  version: 1.0.0

paths:
  /payments:
    post:
      summary: Iniciar un pago
      responses:
        '201':
          description: Pago iniciado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payments/{id}:
    get:
      summary: Consultar estado de un pago
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Estado del pago
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

    delete:
      summary: Anular un pago pendiente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pago anulado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK

components:
  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
